<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Menu</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h1 class="text-center mt-4">Menu</h1>

<div class="row">

<div class="col-md-4 menu-item" onclick="showItem('Chocolate Chip')">
<img src="images/smores.png" class="img-fluid" alt="Chocolate chip cookie">
<h3>Smores</h3>
</div>

<div class="col-md-4 menu-item" onclick="showItem('Cookie Monster')">
<img src="images/cookie-monster.png" class="img-fluid" alt="Cookie monster cookie">
<h3>Cookie Monster</h3>
</div>

<div class="col-md-4 menu-item" onclick="showItem('Biscoff Cookie')">
<img src="images/biscoff.jpg" class="img-fluid" alt="Biscoff cookie">
<h3>Biscoff</h3>
</div>

</div>

<p id="menu-description" class="text-center mt-4"></p>

</div>

<script src="js/script.js"></script>

</body>
</html>
